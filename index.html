<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get Well Soon 💌</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400&family=Inter:wght@300;500;700&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="main-container">
    <div class="stage">
      <div class="card" id="card">
        <span class="mono-label">hi bill!</span>
        <h1>get well soon.</h1>
        <p>- from your interactive media 2 class</p>
      </div>

      <div class="controls">
        <button class="btn-primary" id="open-btn">View Messages</button>
        <button class="btn-secondary" id="close-btn" style="display: none;">Back</button>
        <button class="btn-secondary" id="student-link">Leave a Note</button>
      </div>
    </div>

    <div class="notes-section" id="notes-section">
      <span class="mono-label">COMMUNITY MESSAGES</span>
      <div class="notes-grid" id="notes-list"></div>
    </div>
  </div>

  <div class="overlay" id="modal-overlay">
    <div class="modal">
      <button class="modal-close" id="modal-close">✕</button>
      <span class="mono-label">NEW MESSAGE</span>
      <input type="text" id="author-input" class="field" placeholder="Your Name" />
      <textarea id="message-input" class="field" placeholder="Your message..."></textarea>
      <button class="btn-send" id="send-btn">Send Note</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
